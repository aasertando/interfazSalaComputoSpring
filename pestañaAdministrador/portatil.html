    <label style="width: 100%; text-align: center; margin: 20px;">Ingresar Portatil</label>
    <div
    class="container-sm"
    style="width: 35%;"
    >

        <form th:action="@{/portatil/crear}" th:object="${portatil}" method="post">

            <div class="mb-3">
                <label for="inputPortatilEspec" class="form-label">Especificaciones</label>
                <input
                type="text"
                class="form-control"
                name="inputPortatilEspec"
                method="POST"
                required
                autocomplete="off"
                th:field = "*{especificaciones}"
                />
            </div>

            <button
                type="submit"
                class="btn btn-primary"
                style="width: 100%;"
            >
                Ingresar portatil
            </button>
    
        </form>
        
    </div>

    <div
        class="container"
    >
        
        

    </div>
    

    <label style="width: 100%; text-align: center; margin: 20px;">Portatiles ingresados</label>
