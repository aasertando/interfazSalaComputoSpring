    <label style="width: 100%; text-align: center; margin: 20px;">Ingresar Sala</label>
    <div
    class="container-sm"
    style="width: 35%;"
    >
    
        <form th:action="@{/sala/crear}" method="post">

            <div class="mb-3">
                <label for="inputSalaNombre" class="form-label">Nombre</label>
                <input
                type="text"
                class="form-control"
                name="inputSalaNombre"
                method="POST"
                required
                autocomplete="off"
                />
            </div>

            <div class="mb-3">
                <label for="inputSalaCapacidad" class="form-label">Capacidad</label>
                <input
                    type="number"
                    class="form-control"
                    name="inputSalaCapacidad"
                    method="POST"
                    required
                    autocomplete="off"
                    />
            </div>


            <button
                type="submit"
                class="btn btn-primary"
                style="width: 100%;"
            >
                Ingresar sala
            </button>

        </form>

    </div>

    <div
        class="container"
    >
        
        

    </div>
    

    <label style="width: 100%; text-align: center; margin: 20px;">Salas ingresadas</label>

</body>
