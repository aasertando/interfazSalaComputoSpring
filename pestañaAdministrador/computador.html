<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computador | Salas computo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <nav
        class="nav justify-content-center"
    >
        <!-- <a class="nav-link active" href="#" aria-current="page"
            >Cosa1</a
        > -->
        <a class="nav-link" href="estudiante.html">Estudiante</a>
        <a class="nav-link" href="profesor.html">Profesor</a>

        <a class="nav-link" href="portatil.html">Portatil</a>
        <a class="nav-link" href="sala.html">Sala</a>
    </nav>

    
    
    
    <label style="width: 100%; text-align: center; margin: 20px;">Ingresar computador</label>
    <div
    class="container-sm"
    style="width: 35%;"
    >
        <form th:action="@{/computador/crear}" method="post">

            <div class="mb-3">
                <label for="inputComputadorEspec" class="form-label">Especificaciones</label>
                <input
                type="text"
                class="form-control"
                name="inputComputadorEspec"
                method="POST"
                required
                autocomplete="off"
                />
            </div>

            <div class="mb-3">
                <label for="selectComputadorSalaPerteneciente" class="form-label">Sala perteneciente</label>
                <select
                    class="form-select form-select-lg"
                    name="selectComputadorSalaPerteneciente"
                >
                    <!-- <option selected></option> -->
                    <option value="">${sala}</option>
                </select>
            </div>

            <button
                type="submit"
                class="btn btn-primary"
                style="width: 100%;"
            >
                Ingresar computador
            </button>

        </form>
    </div>

    <div
        class="container"
    >
        
        

    </div>
    

    <label style="width: 100%; text-align: center; margin: 20px;">Computadores ingresados</label>

</body>
