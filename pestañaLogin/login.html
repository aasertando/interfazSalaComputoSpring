<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Salas computo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #00405d;">


    <div
        class="container-sm"
        style="
        width: 25%;
        text-align: center;
        background-color: #1f6180;
        padding: 20px;
        border-radius: 10px;
        margin-top: 10%;
        color: white;
        "
    >

        <div class="mb-3">
            <label for="user" class="form-label" style="font-size: x-large;">Usuario</label>
            <input
                type="text"
                class="form-control"
                name="inputUser"
                aria-describedby="helpId"
                autocomplete="off"
                method="POST"
                required
                style="background-color: #bedbf0;
                color: #2D2438;"
            />
        </div>

        <div class="mb-3">
            <label for="password" class="form-label" style="font-size: x-large;">Contraseña</label>
            <input
                type="password"
                class="form-control"
                name="inputPassword"
                method="POST"
                required
                style="background-color: #bedbf0;
                color: #2D2438;"
            />
        </div>
        
        <button
            type="submit"
            class="btn btn-primary"
            style="background-color: #2f7191;
            border: none;"
        >
            Iniciar sesión
        </button>
        

    </div>
</body>
</html>
